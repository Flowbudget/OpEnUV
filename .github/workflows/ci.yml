name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSIONS: '["3.10", "3.11", "3.12", "3.13"]'

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: ubuntu-latest
            python-version: "3.13"
            experimental: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ matrix.experimental == true }}
          # cache: 'pip'  # disabled - we use uv for dependency management

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --all-extras --python ${{ matrix.python-version }}
          uv pip list

      - name: Run tests
        run: |
          uv run pytest -x -v --tb=short -n auto --cov=src/euv --cov-report=xml --cov-report=term-missing ${{ matrix.os == 'windows-latest' && '-k "not (TestPlotting or test_export_gds)"' || '' }}
        env:
          PYTHONPATH: src
          MPLBACKEND: Agg

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Check coverage threshold
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          uv run coverage report --fail-under=80

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # cache: 'pip'  # disabled - we use uv for dependency management

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --all-extras --python 3.12
          uv pip install ruff mypy pyright

      - name: Run ruff (lint)
        run: |
          uv run ruff check src/ tests/ --output-format=github

      - name: Run ruff format check
        run: |
          uv run ruff format --check src/ tests/

      - name: Run mypy (type check)
        run: |
          uv run mypy src/euv --strict --show-error-codes --pretty --python-version 3.12 || true

      - name: Run pyright (optional, non-blocking)
        continue-on-error: true
        run: |
          uv run pyright src/euv || true

  notebooks:
    name: Execute Notebooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # cache: 'pip'  # disabled - we use uv for dependency management

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --extra notebook --extra test --python 3.12

      - name: Execute notebooks
        run: |
          cd notebooks
          for nb in *.ipynb; do
            echo "Executing $nb..."
            uv run jupyter nbconvert --execute --to notebook --inplace --ExecutePreprocessor.timeout=300 "$nb"
          done

  build-wheel:
    name: Build Wheel
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # cache: 'pip'  # disabled - we use uv/pip for build deps only

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Install build dependencies
        run: |
          uv pip install build twine --python 3.12

      - name: Build wheel
        run: |
          uv run python -m build --wheel --no-isolation

      - name: Verify wheel
        run: |
          uv run twine check dist/*.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ github.sha }}
          path: dist/*.whl
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-wheel]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel-${{ github.sha }}
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.whl
          generate_release_notes: true
          draft: false
          prerelease: false