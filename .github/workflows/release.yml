name: Release Build

on:
  workflow_dispatch:  # manuell triggern: "Run workflow" Button in Actions
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build Wheels (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Install build dependencies
        shell: bash
        run: |
          pip install --upgrade pip setuptools wheel build

      - name: Build wheel
        shell: bash
        run: python -m build --wheel --no-isolation

      - name: Verify wheel
        shell: bash
        run: |
          pip install dist/*.whl
          python -c "import euv; print(f'openuv {euv.__version__} imported successfully')"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl
          retention-days: 90

  package-release:
    name: Package Release Assets
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-wheel-*
          path: dist/
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Create source distribution
        shell: bash
        run: |
          pip install --upgrade pip
          pip install build
          python -m build --sdist

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            dist/*.whl
            dist/*.tar.gz
          retention-days: 90

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}