---
name: Bug Report
description: Create a report to help us improve
title: "[Bug]: "
labels: ["bug", "triage"]
assignees:
  - Flowbudget
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of what the bug is.
      placeholder: When I run `euv simulate ...`, the simulation crashes with...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Run command '...'
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: OpEnUV version
      description: What version of OpEnUV are you using? Run `euv version` to check.
      placeholder: "1.0.3"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      description: What Python version are you using?
      placeholder: "3.12.3"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      description: What OS are you running?
      placeholder: "Ubuntu 22.04 / macOS 14 / Windows 11"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack trace
      description: Paste any relevant logs, error messages, or stack traces here.
      render: shell
  - type: textarea
    id: config
    attributes:
      label: Configuration (if applicable)
      description: If the issue is related to a simulation config, paste your YAML/JSON config here.
      render: yaml
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I am using the latest release (or main branch)
          required: true
        - label: I have provided a minimal reproducible example
          required: true