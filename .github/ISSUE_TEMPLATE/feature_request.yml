---
name: Feature Request
description: Suggest an idea for OpEnUV
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees:
  - Flowbudget
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please describe what you'd like to see added to OpEnUV.
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is. Ex. I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, links to papers, or screenshots about the feature request here.
      placeholder: |
        - Paper: "Title" (DOI/URL)
        - Related issue: #123
        - Mockup: [link]
  - type: dropdown
    id: module
    attributes:
      label: Which module is this related to?
      options:
        - Source / Plasma (euv.source)
        - Materials / CXRO (euv.materials)
        - Optics / Multilayer (euv.optics)
        - Mask 3D / RCWA (euv.mask3d)
        - Aerial Image / Hopkins (euv.aerial)
        - Resist / Dill ABC (euv.resist)
        - Pipeline (euv.pipeline)
        - Metrology / Process Window (euv.metro)
        - OPC / ILT (euv.opc)
        - CLI / IO (euv.io)
        - API / Dashboard (euv.api)
        - Not module-specific
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues/discussions to avoid duplicates
          required: true
        - label: This feature aligns with the project roadmap (see COMPLETION_PLAN.md)
          required: false
        - label: I'm willing to contribute a PR for this feature
          required: false